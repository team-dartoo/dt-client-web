server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # ========================================================================
    # API 프록시 (백엔드 Gateway로 포워딩)
    # ========================================================================
    # MOCK_MODE=false 인 경우, 아래 환경변수으로 Gateway 주소 설정 가능
    # docker-compose에서 GATEWAY_URL 환경변수로 주입 가능

    location /api/ {
        # API 요청을 Gateway로 포워딩
        proxy_pass ${GATEWAY_URL}/api/;
        proxy_http_version 1.1;

        # 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 지원 (필요한 경우)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # CORS 관련 헤더 (백엔드에서 처리하지만 추가 설정)
        proxy_set_header Access-Control-Allow-Origin *;
        proxy_set_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        proxy_set_header Access-Control-Allow-Headers "Content-Type, Authorization";

        # 타임아웃 설정
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ========================================================================
    # OAuth 리다이렉트 (필요한 경우)
    # ========================================================================
    location /oauth2/ {
        proxy_pass ${GATEWAY_URL}/oauth2/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================================================
    # 정적 파일 캐싱 (Vite 빌드 결과물)
    # ========================================================================
    # 해시가 있는 파일 (assets/[name].[hash].js)은 긴 캐시
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ========================================================================
    # SPA 라우팅 (React Router v7)
    # ========================================================================
    # 존재하는 정적 파일이면 제공
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ========================================================================
    # 헬스체크 (쿠버네티스/로드밸런서용)
    # ========================================================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
